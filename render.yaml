services:
  - type: web
    name: voting-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn voting_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: voting-db
          property: connectionString

databases:
  - name: voting-db
    databaseName: voting_backend
    user: voting_user
    plan: free
